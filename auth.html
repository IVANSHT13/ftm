<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pro League authentication page for sign in and registration.">
  <title>Pro League | Auth</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/pro-league.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container py-2">
        <a class="navbar-brand" href="index.html"><span class="brand-mark me-2"><i class="bi bi-trophy-fill"></i></span>Pro League</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="fixtures.html">Fixtures</a></li>
            <li class="nav-item"><a class="nav-link" href="standings.html">Standings</a></li>
            <li class="nav-item"><a class="nav-link" href="management.html">Management</a></li>
            <li class="nav-item"><a class="nav-link active" href="auth.html">Auth</a></li>
            <li class="nav-item"><a class="nav-link" href="storage.html">Storage</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5 position-relative">
      <header class="page-header">
        <div class="eyebrow mb-3"><i class="bi bi-person-vcard-fill"></i> Secure access</div>
        <h1 class="page-title mb-3">Authentication</h1>
        <p class="lead fs-5 hero-copy">Sign up, log in, and manage secure access for organizers, referees, and league staff.</p>
      </header>

      <section class="row g-4">
        <div class="col-lg-6">
          <div class="screen-card p-4 h-100">
            <div class="muted-label mb-2">Sign in</div>
            <h2 class="h4 mb-3">Return to your Pro League account</h2>
            <div class="mb-3"><label class="form-label">Email</label><input class="form-control form-control-lg" type="email" placeholder="name@proleague.com"></div>
            <div class="mb-3"><label class="form-label">Password</label><input class="form-control form-control-lg" type="password" placeholder="Enter password"></div>
            <button class="btn btn-accent btn-lg px-4" type="button">Sign in</button>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="status-card p-4 h-100">
            <div class="muted-label mb-2">Sign up</div>
            <h2 class="h4 mb-3">Create a new organizer account</h2>
            <div class="mb-3"><label class="form-label">Full name</label><input class="form-control form-control-lg" type="text" placeholder="League manager name"></div>
            <div class="mb-3"><label class="form-label">Email</label><input class="form-control form-control-lg" type="email" placeholder="name@proleague.com"></div>
            <button class="btn btn-outline-soft btn-lg px-4" type="button">Create account</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
